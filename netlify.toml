[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"
  # These values are provider URL/model identifiers, not secrets. Netlify's
  # scanner compares all env var values against repo files, including examples.
  SECRETS_SCAN_OMIT_KEYS = "MINICPM_V_API_URL,MINICPM_V_MODEL"

[functions]
  node_bundler = "esbuild"
  included_files = ["prisma/schema.prisma", "node_modules/.prisma/client/schema.prisma"]

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
