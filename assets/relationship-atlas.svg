<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" role="img" aria-label="Love Atlas 抽象关系地图">
  <defs>
    <radialGradient id="bg" cx="50%" cy="42%" r="70%">
      <stop offset="0%" stop-color="#293465"/>
      <stop offset="55%" stop-color="#111936"/>
      <stop offset="100%" stop-color="#070b1d"/>
    </radialGradient>
    <radialGradient id="pink" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffc0cf" stop-opacity=".95"/>
      <stop offset="100%" stop-color="#ff8fb3" stop-opacity=".04"/>
    </radialGradient>
    <radialGradient id="blue" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#9cc8ff" stop-opacity=".9"/>
      <stop offset="100%" stop-color="#7aa5ff" stop-opacity=".03"/>
    </radialGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1200" height="900" fill="url(#bg)"/>
  <g opacity=".75">
    <circle cx="190" cy="150" r="2" fill="#fff"/>
    <circle cx="295" cy="265" r="1.5" fill="#fff"/>
    <circle cx="820" cy="120" r="2" fill="#fff"/>
    <circle cx="1010" cy="310" r="1.6" fill="#fff"/>
    <circle cx="1030" cy="720" r="2" fill="#fff"/>
    <circle cx="250" cy="750" r="1.5" fill="#fff"/>
    <circle cx="690" cy="760" r="1.2" fill="#fff"/>
  </g>
  <g filter="url(#blur)" opacity=".5">
    <circle cx="355" cy="395" r="145" fill="url(#pink)"/>
    <circle cx="775" cy="430" r="170" fill="url(#blue)"/>
    <circle cx="600" cy="620" r="125" fill="#ffdca6" opacity=".14"/>
  </g>
  <g fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M250 520 C365 300 515 260 640 410 C765 560 890 525 990 350" stroke="#ffd6df" stroke-opacity=".34" stroke-width="2.6"/>
    <path d="M245 570 C420 710 650 685 840 530" stroke="#92c7ff" stroke-opacity=".28" stroke-width="2"/>
    <path d="M365 265 C475 385 552 512 610 705" stroke="#d3b3ff" stroke-opacity=".22" stroke-width="2"/>
    <path d="M260 375 C465 455 640 315 945 550" stroke="#ffd08a" stroke-opacity=".22" stroke-width="2"/>
  </g>
  <g filter="url(#glow)">
    <circle cx="250" cy="520" r="14" fill="#ffc0cf"/>
    <circle cx="640" cy="410" r="11" fill="#ffdca6"/>
    <circle cx="990" cy="350" r="13" fill="#9cc8ff"/>
    <circle cx="840" cy="530" r="9" fill="#d3b3ff"/>
    <circle cx="610" cy="705" r="10" fill="#ffc0cf"/>
  </g>
  <g fill="#f6f0ff" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="600" opacity=".92">
    <text x="210" y="575">Emotion Forest</text>
    <text x="690" y="355">Memory Coast</text>
    <text x="485" y="390">Life Valley</text>
    <text x="875" y="595">Future City</text>
    <text x="445" y="755">Boundary Garden</text>
  </g>
</svg>
