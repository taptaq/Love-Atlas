<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>发现图鉴 — Love Atlas Lite</title>
    <script src="data/discoveries.js"></script>
    <script src="scripts/atlasDiscoveryEngine.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
            background: linear-gradient(180deg, #0a0a1a 0%, #151525 50%, #0a0a1a 100%);
            color: #f5f5f5;
            min-height: 100vh;
        }

        .back-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: #f5f5f5;
            padding: 10px 16px;
            border-radius: 50px;
            cursor: pointer;
            font-size: 14px;
            z-index: 100;
            transition: all 0.2s;
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 60px 20px 80px;
        }

        .page-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .page-header .icon {
            font-size: 48px;
            margin-bottom: 12px;
        }

        .page-header h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .page-header p {
            color: #a0a0b0;
            font-size: 14px;
            margin-bottom: 20px;
        }

        .progress-box {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            padding: 10px 20px;
            border-radius: 50px;
            background: rgba(139, 92, 246, 0.1);
            border: 1px solid rgba(139, 92, 246, 0.3);
            color: #c4b5fd;
            font-size: 15px;
        }

        .progress-box .num {
            font-weight: 700;
            font-size: 18px;
            color: #f5f5f5;
        }

        .filter-tabs {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-bottom: 28px;
            flex-wrap: wrap;
        }

        .filter-tab {
            padding: 8px 16px;
            border-radius: 50px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #a0a0b0;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .filter-tab:hover {
            background: rgba(255, 255, 255, 0.1);
            color: #f5f5f5;
        }

        .filter-tab.active {
            background: rgba(139, 92, 246, 0.2);
            border-color: rgba(139, 92, 246, 0.4);
            color: #c4b5fd;
        }

        .category-section {
            margin-bottom: 32px;
        }

        .category-title {
            font-size: 14px;
            color: #8080a0;
            margin-bottom: 12px;
            letter-spacing: 0.05em;
        }

        .discovery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 12px;
        }

        .discovery-card {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.04) 0%, rgba(255, 255, 255, 0.02) 100%);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 14px;
            padding: 16px;
            transition: transform 0.2s, border-color 0.2s;
            min-height: 100px;
        }

        .discovery-card.unlocked:hover {
            transform: translateY(-2px);
            border-color: rgba(255, 255, 255, 0.15);
        }

        .discovery-card.locked {
            opacity: 0.55;
            background: rgba(255, 255, 255, 0.02);
        }

        .card-header {
            display: flex;
            align-items: flex-start;
            gap: 12px;
        }

        .card-icon {
            font-size: 28px;
            line-height: 1;
            flex-shrink: 0;
        }

        .card-text {
            flex: 1;
            min-width: 0;
        }

        .card-title {
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .card-message {
            font-size: 13px;
            color: #b8b8c8;
            line-height: 1.5;
        }

        .locked-icon {
            font-size: 28px;
            opacity: 0.7;
        }

        .locked-title {
            font-size: 15px;
            font-weight: 600;
            color: #a0a0b0;
            letter-spacing: 0.2em;
        }

        .locked-hint {
            font-size: 12px;
            color: #70708a;
            margin-top: 4px;
        }

        .category-count {
            font-size: 12px;
            color: #8080a0;
            margin-left: 8px;
            font-weight: 500;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #70707a;
        }

        .empty-state .empty-icon {
            font-size: 56px;
            margin-bottom: 16px;
            opacity: 0.6;
        }

        .empty-state h3 {
            font-size: 16px;
            font-weight: 500;
            margin-bottom: 8px;
            color: #a0a0b0;
        }

        .empty-state p {
            font-size: 13px;
            line-height: 1.6;
        }

        @media (max-width: 600px) {
            .container {
                padding: 60px 16px 80px;
            }

            .page-header h1 {
                font-size: 22px;
            }

            .discovery-grid {
                grid-template-columns: 1fr 1fr;
                gap: 10px;
            }

            .card-title {
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <button class="back-btn" onclick="goBack()" id="back-btn">← 返回</button>

    <div class="container">
        <div class="page-header">
            <div class="icon">✨</div>
            <h1 id="page-title">关系发现图鉴</h1>
            <p id="page-subtitle">你们一起探索后留下的 45 个痕迹</p>
            <div class="progress-box">
                <span id="progress-prefix">已发现</span> <span class="num" id="progress-count">0</span>
                <span id="progress-total">/ 45</span>
            </div>
        </div>

        <div class="filter-tabs">
            <button class="filter-tab active" data-filter="all" onclick="setFilter('all')" id="filter-all">全部</button>
            <button class="filter-tab" data-filter="event" onclick="setFilter('event')" id="filter-event">事件</button>
            <button class="filter-tab" data-filter="region" onclick="setFilter('region')" id="filter-region">区域</button>
            <button class="filter-tab" data-filter="journey" onclick="setFilter('journey')" id="filter-journey">旅程</button>
            <button class="filter-tab" data-filter="special" onclick="setFilter('special')" id="filter-special">特殊</button>
        </div>

        <div id="discovery-container">
            <!-- 动态生成 -->
        </div>

        <div class="empty-state" id="empty-state" style="display:none;">
            <div class="empty-icon">📖</div>
            <h3 id="empty-title">还没有发现</h3>
            <p id="empty-desc">开始一次探索，你们会留下第一个痕迹。</p>
        </div>
    </div>

    <script>
        const currentLang = (() => {
            try { return localStorage.getItem('loveAtlasLang') || 'cn'; } catch (e) { return 'cn'; }
        })();

        const atlasI18n = {
            cn: {
                back: '← 返回',
                title: '关系发现图鉴',
                subtitle: '你们一起探索后留下的 45 个痕迹',
                progress: '已发现',
                filters: { all: '全部', event: '事件', region: '区域', journey: '旅程', special: '特殊' },
                categories: { event: '事件发现', region: '区域发现', journey: '旅程发现', special: '特殊发现' },
                locked: '继续探索解锁',
                emptyTitle: '还没有发现',
                emptyDesc: '开始一次探索，你们会留下第一个痕迹。'
            },
            en: {
                back: '← Back',
                title: 'Relationship Discovery Atlas',
                subtitle: '45 traces left by your explorations together',
                progress: 'Discovered',
                filters: { all: 'All', event: 'Events', region: 'Regions', journey: 'Journeys', special: 'Special' },
                categories: { event: 'Event Discoveries', region: 'Region Discoveries', journey: 'Journey Discoveries', special: 'Special Discoveries' },
                locked: 'Keep exploring to unlock',
                emptyTitle: 'No discoveries yet',
                emptyDesc: 'Start an exploration and your first trace will appear here.'
            }
        };

        const discoveryI18nEn = {
            event_mirror_01: ['Start truly listening to each other', 'Understanding and expression are not always the same.'], event_mirror_02: ['Seeing from the other side', 'The moment you answer for each other, the difference becomes visible.'], event_switch_01: ['A different angle', 'It is not about right or wrong, but difference.'], event_switch_02: ['A gap in understanding', 'Thinking you understand can sometimes be your own imagination.'], event_moment_01: ['Today was carefully recorded', 'This moment has been kept.'], event_moment_02: ['This moment left a trace', 'Every uploaded image is a small freeze-frame.'], event_memory_01: ['The past was brought up again', 'Some words had not been spoken for a long time.'], event_memory_02: ['The first closeness', 'You still remember when closeness first appeared.'], event_future_01: ['First talk about later', 'The future begins to take shape.'], event_future_02: ['Your futures are aligning', 'Your imagined futures begin to overlap.'], event_silence_01: ['Silence is also a conversation', 'Thirty quiet seconds can also bring you closer.'], event_silence_02: ['Hearing each other in quiet', 'Silent moments can still contain a lot.'], region_forest_01: ['Starting to express', 'Some feelings were spoken today.'], region_forest_02: ['Deep in Emotion Forest', 'Deeper feelings were brought up.'], region_coast_01: ['The past resurfaced', 'Memories from the coast returned.'], region_coast_02: ['Echoes from the coast', 'Some things had not been mentioned together for a long time.'], region_valley_01: ['Daily life deserves to be seen', 'The ordinary days you share are precious too.'], region_valley_02: ['The rhythm of life', 'Daily rhythm quietly brings you closer.'], region_city_01: ['The future became concrete', 'Your imagination of the future gained shape.'], region_city_02: ['A shared direction', 'You began imagining the future together.'], region_garden_01: ['Beginning to discuss differences', 'Boundaries can also be explored together.'], region_garden_02: ['The garden is changing', 'The lines between you are slowly adjusting.'], journey_short_01: ['Today did not end too quickly', 'Even a light two-question journey can carry weight.'], journey_normal_01: ['A complete everyday conversation', 'A three-question daily exploration was completed.'], journey_deep_01: ['Deeper than usual', 'A five-question deep exploration is a rare kind of seriousness.'], journey_guess_mismatch_01: ['A new understanding appeared', 'What you assumed was not exactly what they thought.'], journey_guess_match_01: ['You guessed together', 'Some things are surprisingly similar in your minds.'], journey_long_answers_01: ['The first sincere answer', 'The answer was longer and more honest than usual.'], journey_multi_answers_01: ['Complete answers', 'Both of you wrote something down.'], journey_first_complete_01: ['First complete journey', 'You finished your first full exploration together.'], journey_5_complete_01: ['The fifth completion', 'You have had five serious conversations now.'], journey_10_complete_01: ['The tenth completion', 'Ten complete explorations have accumulated.'], journey_multi_regions_01: ['Different places visited', 'You entered multiple different regions.'], journey_all_regions_01: ['Every region has been visited', 'All five regions now hold traces of you.'], journey_with_event_01: ['An event changed the rhythm', 'This journey had a turning point.'], journey_3_event_01: ['Several turning points', 'You have triggered three events already.'], journey_keep_explore_01: ['Continued closeness', 'You have been exploring each other recently.'], special_first_upload_01: ['The one who recorded this moment', 'A photo of the present moment was uploaded for the first time.'], special_mirror_3_01: ['Trying to stand on the other side', 'Mirror events have accumulated three times.'], special_coast_3_01: ['Familiar things can still change', 'Memory Coast has been explored three times.'], special_night_01: ['A night for honest words', 'An exploration was completed late at night.'], special_deep_journey_01: ['A serious conversation', 'One deep five-question journey was completed.'], special_long_answers_01: ['A long answer', 'One answer was especially sincere.'], special_emotion_forest_01: ['A frequent visitor to Emotion Forest', 'You have entered Emotion Forest many times.'], special_full_circle_01: ['A full circle', 'Every type of exploration has been tried.']
        };

        let currentFilter = 'all';

        function getDiscoveryText(item) {
            if (currentLang === 'en' && discoveryI18nEn[item.id]) {
                return { title: discoveryI18nEn[item.id][0], message: discoveryI18nEn[item.id][1] };
            }
            return { title: item.title, message: item.message };
        }

        function applyLanguage() {
            const t = atlasI18n[currentLang] || atlasI18n.cn;
            document.documentElement.lang = currentLang === 'en' ? 'en' : 'zh-CN';
            document.title = currentLang === 'en' ? 'Discovery Atlas — Love Atlas' : '发现图鉴 — Love Atlas';
            document.getElementById('back-btn').textContent = t.back;
            document.getElementById('page-title').textContent = t.title;
            document.getElementById('page-subtitle').textContent = t.subtitle;
            document.getElementById('progress-prefix').textContent = t.progress;
            document.getElementById('filter-all').textContent = t.filters.all;
            document.getElementById('filter-event').textContent = t.filters.event;
            document.getElementById('filter-region').textContent = t.filters.region;
            document.getElementById('filter-journey').textContent = t.filters.journey;
            document.getElementById('filter-special').textContent = t.filters.special;
            document.getElementById('empty-title').textContent = t.emptyTitle;
            document.getElementById('empty-desc').textContent = t.emptyDesc;
        }

        function goBack() {
            window.location.href = './Love Atlas.html';
        }

        function setFilter(filter) {
            currentFilter = filter;
            document.querySelectorAll('.filter-tab').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.filter === filter);
            });
            render();
        }

        function render() {
            const t = atlasI18n[currentLang] || atlasI18n.cn;
            const engine = window.AtlasDiscoveryEngine;
            const data = window.AtlasData;
            const pool = data.DISCOVERY_POOL;
            const state = engine.loadAtlasState();
            const unlockedIds = new Set(state.unlocked.map(u => u.id));

            document.getElementById('progress-count').textContent = state.unlocked.length;
            document.getElementById('progress-total').textContent = '/ ' + pool.length;

            const container = document.getElementById('discovery-container');
            container.innerHTML = '';

            let hasContent = false;

            ['event', 'region', 'journey', 'special'].forEach(cat => {
                if (currentFilter !== 'all' && currentFilter !== cat) return;

                const items = pool.filter(p => p.category === cat);
                if (!items || items.length === 0) return;
                hasContent = true;

                const section = document.createElement('div');
                section.className = 'category-section';

                const catUnlocked = items.filter(p => unlockedIds.has(p.id)).length;
                section.innerHTML = `<div class="category-title">${t.categories[cat]}<span class="category-count">${catUnlocked} / ${items.length}</span></div>`;

                const grid = document.createElement('div');
                grid.className = 'discovery-grid';

                items.forEach(item => {
                    const unlocked = unlockedIds.has(item.id);
                    const card = document.createElement('div');
                    if (unlocked) {
                        const text = getDiscoveryText(item);
                        card.className = 'discovery-card unlocked';
                        card.innerHTML = `<div class="card-header">
                            <div class="card-icon">${item.icon}</div>
                            <div class="card-text">
                                <div class="card-title">${text.title}</div>
                                <div class="card-message">${text.message}</div>
                            </div>
                        </div>`;
                    } else {
                        card.className = 'discovery-card locked';
                        card.innerHTML = `<div class="card-header">
                            <div class="card-icon">❓</div>
                            <div class="card-text">
                                <div class="locked-title">???</div>
                                <div class="locked-hint">${t.locked}</div>
                            </div>
                        </div>`;
                    }
                    grid.appendChild(card);
                });

                section.appendChild(grid);
                container.appendChild(section);
            });

            document.getElementById('empty-state').style.display = hasContent ? 'none' : 'block';
        }

        applyLanguage();
        render();
    </script>
</body>
</html>
